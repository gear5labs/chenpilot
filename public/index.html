<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chen Pilot Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 30px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 24px;
      color: #111;
    }
    .setting-item {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }
    .setting-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #555;
    }
    .select, .input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.2s;
    }
    .select:focus, .input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }
    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-switch {
      position: relative;
      width: 52px;
      height: 28px;
      background-color: #e5e7eb;
      border-radius: 14px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .toggle-switch.active {
      background-color: #2563eb;
    }
    .toggle-switch::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 24px;
      height: 24px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch.active::before {
      transform: translateX(24px);
    }
    .save-btn {
      width: 100%;
      padding: 14px;
      background-color: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    .save-btn:hover {
      background-color: #1d4ed8;
    }
    .save-btn:active {
      transform: translateY(1px);
    }
    .success-msg {
      display: none;
      background-color: #dcfce7;
      color: #166534;
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 20px;
      text-align: center;
    }
    .success-msg.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ Chen Pilot Settings</h1>
    
    <div class="setting-item">
      <label class="label">Preferred Currency</label>
      <select class="select" id="currency">
        <option value="USD">USD</option>
        <option value="XLM">XLM</option>
        <option value="BTC">BTC</option>
      </select>
    </div>
    
    <div class="setting-item">
      <div class="toggle">
        <span class="label">Price Alerts</span>
        <div class="toggle-switch active" id="priceAlertsToggle"></div>
      </div>
    </div>
    
    <div class="setting-item">
      <div class="toggle">
        <span class="label">Transaction Notifications</span>
        <div class="toggle-switch active" id="txNotificationsToggle"></div>
      </div>
    </div>
    
    <div class="setting-item">
      <div class="toggle">
        <span class="label">Daily Market Digest</span>
        <div class="toggle-switch" id="marketDigestToggle"></div>
      </div>
    </div>

    <button class="save-btn" id="saveBtn">Save Settings</button>
    
    <div class="success-msg" id="successMsg">
      ✅ Settings saved successfully!
    </div>
  </div>

  <script>
    // Check if we're in Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.ready();
    
    // Initialize with sample data
    const savedSettings = JSON.parse(localStorage.getItem('chenPilotSettings') || JSON.stringify({
      currency: 'USD',
      priceAlerts: true,
      txNotifications: true,
      marketDigest: false
    }));
    
    document.getElementById('currency').value = savedSettings.currency;
    document.getElementById('priceAlertsToggle').classList.toggle('active', savedSettings.priceAlerts);
    document.getElementById('txNotificationsToggle').classList.toggle('active', savedSettings.txNotifications);
    document.getElementById('marketDigestToggle').classList.toggle('active', savedSettings.marketDigest);
    
    // Toggle switches
    document.querySelectorAll('.toggle-switch').forEach(toggle => {
      toggle.addEventListener('click', function() {
        this.classList.toggle('active');
      });
    });
    
    // Save settings
    document.getElementById('saveBtn').addEventListener('click', function() {
      const settings = {
        currency: document.getElementById('currency').value,
        priceAlerts: document.getElementById('priceAlertsToggle').classList.contains('active'),
        txNotifications: document.getElementById('txNotificationsToggle').classList.contains('active'),
        marketDigest: document.getElementById('marketDigestToggle').classList.contains('active')
      };
      
      localStorage.setItem('chenPilotSettings', JSON.stringify(settings));
      
      const successMsg = document.getElementById('successMsg');
      successMsg.classList.add('show');
      
      setTimeout(() => {
        successMsg.classList.remove('show');
        tg.close();
      }, 1500);
    });
  </script>
</body>
</html>
